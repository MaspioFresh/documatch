
services:
  backend:
    profiles: ["default", "dev"]
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: documatch_backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend/documatch.db:/backend/documatch.db
      - ./backend/mock_emails:/backend/mock_emails
      - ./backend/app:/backend/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    # Variabili d'ambiente lette dal file .env nella root del backend (se esiste).
    # In locale: le variabili non impostate usano i valori di fallback nel codice.
    # In produzione Azure: impostare queste variabili nel pannello App Configuration.
    env_file:
      - path: ./backend/.env
        required: false       # Non fallisce se .env non esiste (sviluppo locale)
    environment:
      # Sovrascrivibile anche qui direttamente, oppure tramite .env
      - SECRET_KEY=${SECRET_KEY:-documatch_super_secret_key_for_signing_tokens_2026}
      - ADMIN_DEFAULT_PASSWORD=${ADMIN_DEFAULT_PASSWORD:-admin_documatch_2026}
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS:-*}
      - AZURE_DOCUMENT_INTELLIGENCE_KEY=${AZURE_DOCUMENT_INTELLIGENCE_KEY:-}
      - AZURE_DOCUMENT_INTELLIGENCE_ENDPOINT=${AZURE_DOCUMENT_INTELLIGENCE_ENDPOINT:-}
      - AZURE_STORAGE_CONNECTION_STRING=${AZURE_STORAGE_CONNECTION_STRING:-}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/')"]
      interval: 30s
      timeout: 30s
      retries: 4
      start_period: 120s     # Lascia ampio tempo al backend per scaricare modelli spaCy/SentenceTransformer
    restart: always

  frontend:
    profiles: ["default"]
    build:
      context: ./Documatch
      dockerfile: Dockerfile
    container_name: documatch_frontend
    ports:
      - "80:80"
    environment:
      # In Docker locale il backend è raggiungibile tramite il nome del servizio "backend"
      # In produzione Azure: impostare BACKEND_URL=http://<ip-container-backend>:8000
      - BACKEND_URL=${BACKEND_URL:-http://backend:8000}
    depends_on:
      backend:
        condition: service_healthy   # Il frontend aspetta che il backend sia healthy
    restart: always
