server {
    listen 80;
    server_name localhost;
    client_max_body_size 100M;

    # -----------------------------------------------------------------------
    # Proxy API → Backend FastAPI
    # L'indirizzo del backend è iniettato al runtime tramite envsubst.
    # In Docker locale:  BACKEND_URL=http://backend:8000  (nome servizio compose)
    # In produzione Azure: BACKEND_URL=http://<ip-container-backend>:8000
    # -----------------------------------------------------------------------
    location /api/ {
        proxy_pass ${BACKEND_URL}/api/;
        proxy_ssl_server_name on;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # Proxy per file statici (immagini OCR in modalità LocalStorage)
    location /static/ {
        proxy_pass ${BACKEND_URL}/static/;
        proxy_ssl_server_name on;
    }

    # -----------------------------------------------------------------------
    # React SPA — tutti gli altri percorsi servono index.html
    # -----------------------------------------------------------------------
    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
